<!doctype html>
<html lang="en" ng-app="northstarApp">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NorthStar Client Portal (AngularJS)</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- AngularJS (CDN) -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <div class="brand">
          <strong>NorthStar</strong>
          <span class="muted">Client Portal</span>
        </div>
        <nav class="nav">
          <a href="#/">Clients</a>
          <a href="#/new">Add Client</a>
          <a href="/clients">EJS (SSR)</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="notice" ng-if="appError">
        {{ appError }}
      </div>
      <div ng-view></div>
    </main>

    <footer class="footer">
      <div class="container">
        <span class="muted">Lab 5: AngularJS + EJS + MongoDB (Mongoose) + File Storage</span>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
