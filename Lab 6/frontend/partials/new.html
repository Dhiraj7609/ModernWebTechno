<section class="card">
  <div class="card-header">
    <h2>Add Client</h2>
    <div class="muted">Creates a client via /api/clients (also saved to JSON file + MongoDB if available)</div>
  </div>

  <p class="error" ng-if="error">{{ error }}</p>

  <div class="form">
    <label>
      Full Name
      <input class="input" type="text" ng-model="form.fullName" />
    </label>

    <label>
      Email
      <input class="input" type="email" ng-model="form.email" />
    </label>

    <label>
      Risk Category
      <select class="input" ng-model="form.riskCategory">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </label>

    <div class="row gap">
      <button class="btn" ng-click="save()" ng-disabled="saving">Save</button>
      <a class="btn btn-ghost" href="#/">Cancel</a>
    </div>
  </div>
</section>
